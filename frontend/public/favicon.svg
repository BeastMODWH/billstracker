<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description><dc:creator>RealFaviconGenerator</dc:creator><dc:source>https://realfavicongenerator.net</dc:source></rdf:Description></rdf:RDF></metadata><rect width="512" height="512" rx="100" fill="#0f172a"></rect><defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1"></stop>
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1"></stop>
    </linearGradient>
  </defs><g transform="translate(256, 256)">
    <!-- Wallet body -->
    <rect x="-140" y="-90" width="280" height="180" rx="30" fill="url(#grad)" stroke="#ffffff" stroke-width="8"></rect>
    
    <!-- Wallet flap -->
    <path d="M -140 -60 Q -140 -120 -80 -120 Q -20 -120 0 -60" fill="url(#grad)" stroke="#ffffff" stroke-width="8"></path>
    
    <!-- Money symbol -->
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="70" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">£</text>
    
    <!-- Bill icon inside -->
    <rect x="-60" y="-30" width="120" height="60" rx="5" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)" stroke-width="3"></rect>
    <line x1="-40" y1="-15" x2="40" y2="-15" stroke="rgba(255,255,255,0.5)" stroke-width="3"></line>
    <line x1="-40" y1="-5" x2="30" y2="-5" stroke="rgba(255,255,255,0.5)" stroke-width="3"></line>
    <line x1="-40" y1="5" x2="20" y2="5" stroke="rgba(255,255,255,0.5)" stroke-width="3"></line>
  </g></svg>